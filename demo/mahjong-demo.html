<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄 AI Mahjong Arena - Standalone Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans HK', sans-serif; background: #0a0a0f; }
    </style>
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Three.js -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <!-- React Three Fiber -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-three-fiber@6.0.13/dist/react-three-fiber.cjs.js"></script>
    <script src="https://unpkg.com/@react-three/drei@9.92.7/dist/drei.cjs.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { Canvas, useFrame, useThree } = ReactThreeFiber;
        const { OrbitControls, Text, Html, Environment, ContactShadows, RoundedBox } = Drei;

        // ============== TILE ASSETS GENERATION ==============
        const SUITS = {
            '萬': { folder: 'characters', color: '#1a5c1a' },
            '筒': { folder: 'dots', color: '#1a1a5c' },
            '索': { folder: 'bamboo', color: '#5c1a1a' },
            '番子': { folder: 'winds', color: '#1a5c1a' },
            '字': { folder: 'honors', color: '#1a5c1a' },
        };

        // Generate canvas texture for a tile
        function createTileTexture(suit, value) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 341;
            const ctx = canvas.getContext('2d');
            
            // Ivory background
            const gradient = ctx.createLinearGradient(0, 0, 256, 341);
            gradient.addColorStop(0, '#faf6ef');
            gradient.addColorStop(1, '#e8dfcf');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 341);
            
            // Border
            ctx.strokeStyle = '#c9b896';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, 246, 331);
            
            // Suit color
            const suitInfo = SUITS[suit] || SUITS['萬'];
            let color = suitInfo.color;
            
            // Red for special tiles
            if (['3', '6', '9'].includes(value) || ['中', '發'].includes(value) || suit === '字') {
                color = '#c41e3a';
            }
            
            // Value in corner
            ctx.fillStyle = color;
            ctx.font = 'bold 36px "Noto Sans HK", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(value, 20, 50);
            
            // Suit character in center
            ctx.font = 'bold 160px "Noto Sans HK", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let suitChar = suit;
            if (suit === '番子') {
                const windMap = { '東': '東', '南': '南', '西': '西', '北': '北' };
                suitChar = windMap[value] || value;
            }
            if (suit === '字') {
                const honorMap = { '中': '中', '發': '發', '白': '白' };
                suitChar = honorMap[value] || value;
            }
            
            ctx.fillText(suitChar, 128, 180);
            
            // Shine effect
            const shine = ctx.createLinearGradient(0, 0, 0, 100);
            shine.addColorStop(0, 'rgba(255,255,255,0.3)');
            shine.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shine;
            ctx.fillRect(10, 10, 236, 100);
            
            return canvas.toDataURL();
        }

        // Pre-generate textures
        const TILE_TEXTURES = {};
        ['萬', '筒', '索', '番子', '字'].forEach(suit => {
            const values = suit === '番子' ? ['東', '南', '西', '北'] : 
                          suit === '字' ? ['中', '發', '白'] : 
                          ['1', '2', '3', '4', '5', '6', '7', '8', '9'];
            values.forEach(value => {
                const key = `${suit}_${value}`;
                TILE_TEXTURES[key] = createTileTexture(suit, value);
            });
        });

        // ============== GAME LOGIC ==============
        const TILE_WIDTH = 0.3;
        const TILE_HEIGHT = 0.4;
        const TILE_DEPTH = 0.2;

        // Generate 144 tiles
        function generateTiles() {
            const tiles = [];
            const suits = [
                { name: '萬', values: ['1','2','3','4','5','6','7','8','9'] },
                { name: '筒', values: ['1','2','3','4','5','6','7','8','9'] },
                { name: '索', values: ['1','2','3','4','5','6','7','8','9'] },
                { name: '番子', values: ['東','南','西','北'] },
                { name: '字', values: ['中','發','白'] },
            ];
            
            suits.forEach(s => {
                s.values.forEach(v => {
                    for (let i = 0; i < 4; i++) {
                        tiles.push({ suit: s.name, value: v, id: `${s.name}_${v}_${i}` });
                    }
                });
            });
            return tiles;
        }

        // Shuffle
        function shuffle(tiles) {
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            return tiles;
        }

        // ============== MAHJONG TILE COMPONENT ==============
        function MahjongTile({ suit, value, position = [0,0,0], rotation = [0,0,0], isFaceDown = false, isSelected = false, onClick, delay = 0 }) {
            const meshRef = useRef();
            const [hovered, setHovered] = useState(false);
            const [animating, setAnimating] = useState(false);
            const [currentPos, setCurrentPos] = useState(position);
            
            const texture = !isFaceDown && TILE_TEXTURES[`${suit}_${value}`];
            const offset = isSelected ? 0.1 : 0;
            
            useEffect(() => {
                if (delay > 0) {
                    setTimeout(() => {
                        setAnimating(true);
                        setTimeout(() => setAnimating(false), 500);
                    }, delay * 100);
                }
            }, [delay]);
            
            const targetY = position[1] + offset;
            useFrame(() => {
                if (meshRef.current) {
                    meshRef.current.position.y += (targetY - meshRef.current.position.y) * 0.15;
                }
            });
            
            return (
                <mesh
                    ref={meshRef}
                    position={position}
                    rotation={rotation}
                    onClick={onClick}
                    onPointerOver={(e) => { e.stopPropagation(); setHovered(true); }}
                    onPointerOut={() => setHovered(false)}
                    castShadow
                >
                    <boxGeometry args={[TILE_WIDTH, TILE_HEIGHT, TILE_DEPTH]} />
                    {/* Front face */}
                    <meshStandardMaterial 
                        map={!isFaceDown && texture ? new THREE.TextureLoader().load(texture) : null}
                        color={isFaceDown ? '#1a3a5c' : '#f8f4eb'}
                        roughness={0.4}
                        metalness={0.05}
                    />
                    {/* Other faces - ivory */}
                    <meshStandardMaterial color="#f0ebe0" roughness={0.5} />
                    <meshStandardMaterial color="#f0ebe0" roughness={0.5} />
                    <meshStandardMaterial color="#f8f4eb" roughness={0.35} />
                    <meshStandardMaterial color="#e8e0d0" roughness={0.6} />
                    {/* Front */}
                    <meshStandardMaterial 
                        map={!isFaceDown && texture ? new THREE.TextureLoader().load(texture) : null}
                        color={isFaceDown ? '#1a3a5c' : '#f8f4eb'}
                        roughness={0.4}
                        metalness={0.05}
                    />
                    {/* Back */}
                    <meshStandardMaterial color="#f8f4eb" roughness={0.4} />
                    
                    {/* Selection glow */}
                    {isSelected && (
                        <mesh position={[0, TILE_HEIGHT/2 + 0.01, 0]}>
                            <planeGeometry args={[TILE_WIDTH * 0.9, TILE_HEIGHT * 0.9]} />
                            <meshBasicMaterial color="#00d4ff" transparent opacity={0.4} />
                        </mesh>
                    )}
                </mesh>
            );
        }

        // ============== DISCARD POSITION ==============
        function getDiscardPosition(playerIndex, tileIndex) {
            const row = Math.floor(tileIndex / 6);
            const col = tileIndex % 6;
            const dist = 1.3;
            const sx = TILE_WIDTH + 0.01;
            const sz = TILE_HEIGHT + 0.01;
            
            switch(playerIndex) {
                case 0: return [[(col-2.5)*sx, 0.1, dist+row*sz], [0,0,0]];
                case 1: return [[-dist-row*sz, 0.1, (col-2.5)*sx], [0,Math.PI/2,0]];
                case 2: return [[-(col-2.5)*sx, 0.1, -dist-row*sz], [0,Math.PI,0]];
                case 3: return [[dist+row*sz, 0.1, -(col-2.5)*sx], [0,-Math.PI/2,0]];
            }
        }

        // ============== HAND POSITION ==============
        function getHandPosition(playerIndex, tileIndex) {
            const dist = 3.0;
            const spacing = TILE_WIDTH + 0.005;
            const offset = (tileIndex - 6.5) * spacing;
            const tilt = -0.25;
            
            switch(playerIndex) {
                case 0: return [[offset, 0, dist], [tilt, 0, 0]];
                case 1: return [[-dist, 0, offset], [tilt, Math.PI/2, 0]];
                case 2: return [[-offset, 0, -dist], [tilt, Math.PI, 0]];
                case 3: return [[dist, 0, -offset], [tilt, -Math.PI/2, 0]];
            }
        }

        // ============== MAIN SCENE ==============
        function MahjongTableDemo() {
            const [gameState, setGameState] = useState({
                phase: 'idle',
                wall: [],
                hands: [[],[],[],[]],
                discards: [[],[],[],[]],
                scores: [25000, 25000, 25000, 25000],
                currentPlayer: 0,
                selectedTile: null,
            });

            // Initialize game
            useEffect(() => {
                const tiles = shuffle(generateTiles());
                const hands = [[],[],[],[]];
                
                // Deal 13 tiles each
                for (let i = 0; i < 13; i++) {
                    for (let p = 0; p < 4; p++) {
                        hands[p].push(tiles.pop());
                    }
                }
                
                setGameState({
                    phase: 'dealing',
                    wall: tiles,
                    hands,
                    discards: [[],[],[],[]],
                    scores: [25000, 25000, 25000, 25000],
                    currentPlayer: 0,
                    selectedTile: null,
                });
                
                // After dealing animation, start game
                setTimeout(() => {
                    setGameState(s => ({ ...s, phase: 'playing' }));
                }, 2500);
            }, []);

            const handleTileClick = (playerIdx, tileIdx) => {
                if (gameState.phase !== 'playing') return;
                if (playerIdx !== gameState.currentPlayer) return;
                
                setGameState(s => ({
                    ...s,
                    selectedTile: { player: playerIdx, index: tileIdx }
                }));
            };

            const handleDiscard = () => {
                if (!gameState.selectedTile) return;
                const { player, index } = gameState.selectedTile;
                const tile = gameState.hands[player][index];
                
                const newHands = gameState.hands.map((h, i) => 
                    i === player ? h.filter((_, idx) => idx !== index) : [...h]
                );
                const newDiscards = gameState.discards.map((d, i) => 
                    i === player ? [...d, tile] : [...d]
                );
                
                setGameState(s => ({
                    ...s,
                    hands: newHands,
                    discards: newDiscards,
                    currentPlayer: (s.currentPlayer + 1) % 4,
                    selectedTile: null,
                }));
            };

            const directions = ['南', '西', '北', '東'];
            const playerNames = ['GPT-4o', 'Claude', 'Gemini', 'Llama'];

            return (
                <>
                    {/* Lights */}
                    <ambientLight intensity={0.5} />
                    <spotLight position={[0, 15, 0]} angle={0.5} intensity={1.5} castShadow />
                    <pointLight position={[5, 5, 5]} intensity={0.3} color="#4488ff" />
                    <pointLight position={[-5, 5, -5]} intensity={0.3} color="#ff8844" />
                    <Environment preset="night" />

                    {/* Table */}
                    <mesh rotation={[-Math.PI/2, 0, 0]} position={[0, -0.06, 0]} receiveShadow>
                        <planeGeometry args={[10, 10]} />
                        <meshStandardMaterial color="#0d1b2a" roughness={0.8} />
                    </mesh>

                    {/* Central Hub */}
                    <group position={[0, 0.03, 0]}>
                        <mesh rotation={[-Math.PI/2, 0, 0]}>
                            <cylinderGeometry args={[1.4, 1.4, 0.06, 32]} />
                            <meshPhysicalMaterial 
                                color="#ffffff" transmission={0.85} thickness={0.5}
                                roughness={0.1} transparent opacity={0.25}
                            />
                        </mesh>
                        <Text position={[0, 0.04, 0]} rotation={[-Math.PI/2, 0, 0]} 
                            fontSize={0.4} color="#ffd700">東 1 局</Text>
                        <Text position={[0, 0.04, -0.5]} rotation={[-Math.PI/2, 0, 0]} 
                            fontSize={0.15} color="#888">莊家：東</Text>
                        
                        {/* Scores */}
                        {[0,1,2,3].map(i => {
                            const a = (i * Math.PI) / 2;
                            return (
                                <group key={i} position={[Math.sin(a)*1.1, 0.04, Math.cos(a)*1.1]}>
                                    <Text rotation={[-Math.PI/2, 0, 0]} fontSize={0.22} 
                                        color={i===gameState.currentPlayer ? "#00d4ff" : "#fff"}>
                                        {gameState.scores[i].toLocaleString()}
                                    </Text>
                                    <Text rotation={[-Math.PI/2, 0, 0]} position={[0, 0, 0.2]} 
                                        fontSize={0.1} color="#666">{directions[i]}</Text>
                                </group>
                            );
                        })}
                    </group>

                    {/* Discard Tiles */}
                    {gameState.discards.map((pile, pIdx) => (
                        pile.map((tile, tIdx) => {
                            const [pos, rot] = getDiscardPosition(pIdx, tIdx);
                            return (
                                <MahjongTile key={`d${pIdx}-${tIdx}`}
                                    suit={tile.suit} value={tile.value}
                                    position={pos} rotation={rot} isFaceDown={true}
                                    delay={tIdx * 0.05}
                                />
                            );
                        })
                    ))}

                    {/* Player Hands */}
                    {gameState.hands.map((hand, pIdx) => (
                        hand.map((tile, tIdx) => {
                            const [pos, rot] = getHandPosition(pIdx, tIdx);
                            const isSelected = gameState.selectedTile?.player === pIdx && 
                                             gameState.selectedTile?.index === tIdx;
                            return (
                                <MahjongTile key={`h${pIdx}-${tIdx}`}
                                    suit={tile.suit} value={tile.value}
                                    position={pos} rotation={rot}
                                    isFaceDown={pIdx !== 0}
                                    isSelected={isSelected}
                                    onClick={() => handleTileClick(pIdx, tIdx)}
                                    delay={0.1 + tIdx * 0.03}
                                />
                            );
                        })
                    ))}

                    {/* Player Labels */}
                    {[
                        [0, 0, 3.3, 0], [3.3, 0, 0, -Math.PI/2], 
                        [0, 0, -3.3, Math.PI], [-3.3, 0, 0, Math.PI/2]
                    ].map((pos, i) => (
                        <Html key={i} position={pos} center>
                            <div style={{
                                background: 'rgba(0,0,0,0.7)',
                                backdropFilter: 'blur(10px)',
                                padding: '8px 14px',
                                borderRadius: '12px',
                                border: `2px solid ${i === gameState.currentPlayer ? '#00d4ff' : 'rgba(255,255,255,0.2)'}`,
                                whiteSpace: 'nowrap',
                                color: '#fff',
                                textAlign: 'center',
                            }}>
                                <div style={{ fontWeight: 'bold', color: i === gameState.currentPlayer ? '#00d4ff' : '#fff' }}>
                                    {playerNames[i]}
                                </div>
                                <div style={{ fontSize: '11px', color: '#888' }}>{directions[i]}</div>
                            </div>
                        </Html>
                    ))}

                    {/* Discard Button */}
                    {gameState.selectedTile && (
                        <Html center position={[0, -3, 0]}>
                            <button onClick={handleDiscard}
                                style={{
                                    background: '#ff4444',
                                    color: '#fff',
                                    border: 'none',
                                    padding: '14px 36px',
                                    borderRadius: '12px',
                                    fontWeight: 'bold',
                                    fontSize: '15px',
                                    cursor: 'pointer',
                                    boxShadow: '0 4px 20px rgba(255,68,68,0.5)',
                                }}>
                                🀄 打出呢隻牌
                            </button>
                        </Html>
                    )}

                    {/* Phase indicator */}
                    <Html center position={[0, 4, 0]}>
                        <div style={{
                            background: 'rgba(0,0,0,0.6)',
                            padding: '6px 16px',
                            borderRadius: '20px',
                            color: '#666',
                            fontSize: '12px',
                        }}>
                            Phase: {gameState.phase} | Wall: {gameState.wall.length}
                        </div>
                    </Html>

                    <ContactShadows position={[0, -0.05, 0]} opacity={0.4} scale={10} blur={2} />
                    <OrbitControls enablePan={false} minDistance={5} maxDistance={15} />
                </>
            );
        }

        // ============== RENDER ==============
        ReactDOM.render(
            <Canvas shadows camera={{ position: [0, 8, 10], fov: 50 }}>
                <MahjongTableDemo />
            </Canvas>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
