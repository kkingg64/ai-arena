<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mahjong Arena</title>
<style>
body{margin:0;overflow:hidden;background:#050a0f;font-family:'Segoe UI',sans-serif}
canvas{display:block}
.overlay{position:absolute;pointer-events:none;width:100%;color:#fff}
.top-bar{top:0;height:60px;background:rgba(10,20,30,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-around;border-bottom:1px solid rgba(255,255,255,0.1);pointer-events:auto}
.action-bar{bottom:20px;width:100%;display:flex;justify-content:center;gap:15px;pointer-events:auto}
.btn{padding:10px 25px;background:#1a3a5c;border:1px solid #3498db;color:#3498db;border-radius:5px;cursor:pointer;transition:0.3s;font-weight:bold}
.btn:hover{background:#3498db;color:#fff;box-shadow:0 0 15px #3498db}
.btn.primary{background:#e74c3c;border-color:#ff7675;color:#fff}
.thought-stream{position:absolute;left:20px;bottom:120px;width:320px;background:rgba(0,0,0,0.7);padding:15px;border-radius:8px;border-left:4px solid #3498db;font-size:14px;line-height:1.6}
.player-label{position:absolute;color:#fff;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);font-size:16px}
.player-label.top{top:80px;left:50%;transform:translateX(-50%)}
.player-label.bottom{bottom:200px;left:50%;transform:translateX(-50%)}
.player-label.left{left:20px;top:50%;transform:translateY(-50%)}
.player-label.right{right:20px;top:50%;transform:translateY(-50%)}
.player-label.active{color:#f1c40f;text-shadow:0 0 10px #f1c40f}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#050a0f;display:flex;justify-content:center;align-items:center;z-index:100}
</style>
</head>
<body>
<div id="loading">載入 3D 競技場中...</div>
<div class="overlay top-bar">
<div>局數: <span id="round">1/8</span></div>
<div>本場: <span id="pool">0</span></div>
<div>剩餘牌: <span id="remain">70</span></div>
<div>莊家: <strong style="color:#f1c40f" id="dealer">東</strong></div>
<button class="btn" style="padding:5px 10px" onclick="toggleAutoPlay()">⏯️ <span id="autoplay-btn">暫停</span></button>
</div>
<div class="player-label top" id="player-2"><div>西</div><div class="ai-name" id="name-2">Claude</div></div>
<div class="player-label left" id="player-3"><div>南</div><div class="ai-name" id="name-3">Gemini</div></div>
<div class="player-label right" id="player-1"><div>北</div><div class="ai-name" id="name-1">Llama</div></div>
<div class="player-label bottom" id="player-0"><div>東</div><div class="ai-name" id="name-0">GPT-4o</div></div>
<div class="thought-stream">
<div style="color:#3498db;margin-bottom:5px">🧠 <span id="thinking-player">東家</span> 思考中...</div>
<div id="ai-text">遊戲即將開始...</div>
</div>
<div class="overlay action-bar">
<button class="btn" onclick="skipAction()">過</button>
<button class="btn" onclick="ponAction()">碰</button>
<button class="btn" onclick="kongAction()">槓</button>
<button class="btn primary" onclick="winAction()">食糊!!</button>
</div>

<script type="module">
import*as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import{OrbitControls}from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

console.log('Starting Mahjong Arena...');

let scene,camera,renderer,controls;
const TILE_WIDTH=0.3,TILE_HEIGHT=0.4,TILE_DEPTH=0.2;
const DISCARD_GAP=0.06,HAND_SPACING=0.32;
const tileMeshes={hand:[[],[],[],[]],discard:[[],[],[],[]]};
let isAnimating=false,autoPlayInterval=null,isAutoPlaying=true;

const gameState={
players:[
{name:"GPT-4o",hand:[],discards:[],seat:0,color:0xe74c3c},
{name:"Llama",hand:[],discards:[],seat:1,color:0x3498db},
{name:"Claude",hand:[],discards:[],seat:2,color:0x2ecc71},
{name:"Gemini",hand:[],discards:[],seat:3,color:0xf39c12}
],
currentTurn:0,wall:[],dealer:0,round:1,pool:0
};

function createTileTexture(label){
const canvas=document.createElement('canvas');
canvas.width=128;canvas.height=170;
const ctx=canvas.getContext('2d');
ctx.fillStyle='#f8f4eb';ctx.fillRect(0,0,128,170);
ctx.strokeStyle='#c9b896';ctx.lineWidth=4;ctx.strokeRect(2,2,124,166);
ctx.fillStyle='#1a1a2e';ctx.font='bold 48px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(label||'',64,85);
ctx.font='bold 16px Arial';ctx.fillText(label||'',16,20);ctx.fillText(label||'',112,150);
return new THREE.CanvasTexture(canvas);
}

function init(){
console.log('Initializing...');
scene=new THREE.Scene();
scene.background=new THREE.Color(0x050a0f);
camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,10,8);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.setClearColor(0x050a0f);
document.body.appendChild(renderer.domElement);
controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.maxPolarAngle=Math.PI/2.2;
controls.minDistance=5;controls.maxDistance=25;
controls.target.set(0,0,0);controls.update();
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const dirLight=new THREE.DirectionalLight(0xffffff,0.8);
dirLight.position.set(5,15,5);dirLight.castShadow=true;
scene.add(dirLight);
createTable();
initGame();
createAllTiles();
document.getElementById('loading').style.display='none';
console.log('Ready!');
animate();
startAutoPlay();
}

function initGame(){
const suits=['S','D','W'];
const honors=['E','S','W','N','R','G','W'];
let tiles=[];
for(let s of suits)for(let n=1;n<=9;n++)for(let i=0;i<4;i++)tiles.push(n+s);
for(let h of honors)for(let i=0;i<4;i++)tiles.push(h);
for(let i=1;i<=8;i++)tiles.push('F'+i);
for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]];}
gameState.wall=tiles;
for(let p=0;p<4;p++){gameState.players[p].hand=[];for(let i=0;i<13;i++)gameState.players[p].hand.push(tiles.pop());gameState.players[p].hand.sort();}
document.getElementById('remain').textContent=tiles.length;
}

function createTable(){
const geo=new THREE.CylinderGeometry(5,5.2,0.2,64);
const mat=new THREE.MeshStandardMaterial({color:0x0a141e,roughness:0.2,metalness:0.5});
const table=new THREE.Mesh(geo,mat);
table.position.y=-0.11;table.receiveShadow=true;
scene.add(table);
}

function createTileMesh(label,playerIndex){
const group=new THREE.Group();
let texture=label?createTileTexture(label):(()=>{const c=document.createElement('canvas');c.width=128;c.height=170;const x=c.getContext('2d');x.fillStyle='#1a3a5c';x.fillRect(0,0,128,170);x.strokeStyle='#2a4a6c';x.lineWidth=3;x.strokeRect(5,5,118,160);return new THREE.CanvasTexture(c)})();
const faceMat=new THREE.MeshPhongMaterial({map:texture});
if(playerIndex>0){faceMat.emissive=new THREE.Color(gameState.players[playerIndex].color);faceMat.emissiveIntensity=0.15;}
const bodyMat=new THREE.MeshPhongMaterial({color:0xffffff});
const backMat=new THREE.MeshPhongMaterial({map:texture});
const mesh=new THREE.Mesh(new THREE.BoxGeometry(TILE_WIDTH,TILE_HEIGHT,TILE_DEPTH),[bodyMat,bodyMat,faceMat,bodyMat,bodyMat,backMat]);
mesh.castShadow=true;
group.add(mesh);return group;
}

function getHandPosition(p,i){
const s=HAND_SPACING;
if(p===0)return new THREE.Vector3((i-6)*s,TILE_HEIGHT/2,4.5);
if(p===1)return new THREE.Vector3(5,TILE_HEIGHT/2,(i-6)*s);
if(p===2)return new THREE.Vector3((6-i)*s,TILE_HEIGHT/2,-4.5);
return new THREE.Vector3(-5,TILE_HEIGHT/2,(6-i)*s);
}

function getHandRotation(p){
if(p===0)return new THREE.Euler(-0.25,0,0);
if(p===1)return new THREE.Euler(0,-Math.PI/2,0);
if(p===2)return new THREE.Euler(0.25,Math.PI,0);
return new THREE.Euler(0,Math.PI/2,0);
}

function getDiscardPosition(p,i){
const r=Math.floor(i/6),c=i%6,d=2.0,s=TILE_WIDTH+DISCARD_GAP,h=TILE_HEIGHT+DISCARD_GAP;
if(p===0)return new THREE.Vector3((c-2.5)*s,0.015,d+r*h);
if(p===1)return new THREE.Vector3(-d-r*h,0.015,(c-2.5)*s);
if(p===2)return new THREE.Vector3(-(c-2.5)*s,0.015,-d-r*h);
return new THREE.Vector3(d+r*h,0.015,-(c-2.5)*s);
}

function getDiscardRotation(p){
if(p===0)return new THREE.Euler(Math.PI/2,0,0);
if(p===1)return new THREE.Euler(Math.PI/2,0,Math.PI/2);
if(p===2)return new THREE.Euler(Math.PI/2,0,Math.PI);
return new THREE.Euler(Math.PI/2,0,-Math.PI/2);
}

function createAllTiles(){
for(let p=0;p<4;p++){tileMeshes.hand[p].forEach(m=>scene.remove(m));tileMeshes.discard[p].forEach(m=>scene.remove(m));tileMeshes.hand[p]=[];tileMeshes.discard[p]=[];}
for(let p=0;p<4;p++)for(let i=0;i<gameState.players[p].hand.length;i++){
const tile=createTileMesh(gameState.players[p].hand[i],p);
tile.position.copy(getHandPosition(p,i));tile.rotation.copy(getHandRotation(p));
scene.add(tile);tileMeshes.hand[p].push(tile);
}
}

async function nextTurn(){
if(isAnimating||gameState.wall.length===0)return;
isAnimating=true;
const p=gameState.currentTurn;
updateCurrentPlayerUI(p);
document.getElementById('ai-text').textContent=gameState.players[p].name+' 分析中...';
await new Promise(r=>setTimeout(r,800));
gameState.players[p].hand.push(gameState.wall.pop());
gameState.players[p].hand.sort();
document.getElementById('remain').textContent=gameState.wall.length;
createAllTiles();
await new Promise(r=>setTimeout(r,400));
const di=Math.floor(Math.random()*gameState.players[p].hand.length);
const dt=gameState.players[p].hand.splice(di,1)[0];
gameState.players[p].discards.push(dt);
await animateDiscard(p,dt,gameState.players[p].discards.length-1);
createAllTiles();
gameState.currentTurn=(gameState.currentTurn+1)%4;
isAnimating=false;
}

async function animateDiscard(p,tile,di){
const tp=getHandPosition(p,0),dp=getDiscardPosition(p,di),dr=getDiscardRotation(p),tr=getHandRotation(p);
const tm=createTileMesh(tile,p);
tm.position.copy(tp);tm.rotation.copy(tr);scene.add(tm);
const start=Date.now(),dur=600,sp=tp.clone(),rp=tr.clone();
return new Promise(resolve=>{
function loop(){
const e=Date.now()-start,t=Math.min(e/dur,1),k=1-Math.pow(1-t,3);
tm.position.lerpVectors(sp,dp,k);tm.rotation.x=rp.x+(dr.x-rp.x)*k;tm.rotation.y=rp.y+(dr.y-rp.y)*k;tm.rotation.z=rp.z+(dr.z-rp.z)*k;
if(t<1)requestAnimationFrame(loop);else{tileMeshes.discard[p].push(tm);resolve();}
}
loop();
});
}

function updateCurrentPlayerUI(p){
for(let i=0;i<4;i++)document.getElementById('player-'+i).classList.toggle('active',i===p);
document.getElementById('thinking-player').textContent=['東','北','西','南'][p];
}

function startAutoPlay(){
if(autoPlayInterval)clearInterval(autoPlayInterval);
autoPlayInterval=setInterval(()=>{if(isAutoPlaying&&!isAnimating)nextTurn();},2000);
}

function animate(){
if(renderer&&scene&&camera){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}else{
requestAnimationFrame(animate);
}
}
window.addEventListener('resize',()=>{if(camera&&renderer){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);}});
window.toggleAutoPlay=()=>{isAutoPlaying=!isAutoPlaying;document.getElementById('autoplay-btn').textContent=isAutoPlaying?'暫停':'開始';};
init();
</script>
</body>
</html>
