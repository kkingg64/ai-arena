<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mahjong Arena</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
body{margin:0;overflow:hidden;background:#050a0f;font-family:'Segoe UI',sans-serif}
canvas{display:block}
.overlay{position:absolute;pointer-events:none;width:100%;color:#fff}
.top-bar{top:0;height:60px;background:rgba(10,20,30,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-around;border-bottom:1px solid rgba(255,255,255,0.1);pointer-events:auto}
.action-bar{bottom:20px;width:100%;display:flex;justify-content:center;gap:15px;pointer-events:auto}
.btn{padding:10px 25px;background:#1a3a5c;border:1px solid #3498db;color:#3498db;border-radius:5px;cursor:pointer;transition:0.3s;font-weight:bold}
.btn:hover{background:#3498db;color:#fff;box-shadow:0 0 15px #3498db}
.btn.primary{background:#e74c3c;border-color:#ff7675;color:#fff}
.thought-stream{position:absolute;left:20px;bottom:120px;width:320px;background:rgba(0,0,0,0.7);padding:15px;border-radius:8px;border-left:4px solid #3498db;font-size:14px;line-height:1.6}
.player-label{position:absolute;color:#fff;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);font-size:16px}
.player-label.top{top:80px;left:50%;transform:translateX(-50%)}
.player-label.bottom{bottom:200px;left:50%;transform:translateX(-50%)}
.player-label.left{left:20px;top:50%;transform:translateY(-50%)}
.player-label.right{right:20px;top:50%;transform:translateY(-50%)}
.player-label.active{color:#f1c40f;text-shadow:0 0 10px #f1c40f}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#050a0f;display:flex;justify-content:center;align-items:center;z-index:100}
</style>
</head>
<body>
<div id="loading">載入 3D 競技場中...</div>
<div class="overlay top-bar">
<div>局數: <span id="round">1/8</span></div>
<div>本場: <span id="pool">0</span></div>
<div>剩餘牌: <span id="remain">70</span></div>
<div>莊家: <strong style="color:#f1c40f" id="dealer">東</strong></div>
<button class="btn" style="padding:5px 10px" onclick="toggleAutoPlay()">⏯️ <span id="autoplay-btn">暫停</span></button>
</div>
<div class="player-label top" id="player-2"><div>西</div><div class="ai-name">Claude</div></div>
<div class="player-label left" id="player-3"><div>北</div><div class="ai-name">Gemini</div></div>
<div class="player-label right" id="player-1"><div>南</div><div class="ai-name">Llama</div></div>
<div class="player-label bottom" id="player-0"><div>東</div><div class="ai-name">GPT-4o</div></div>
<div class="thought-stream">
<div style="color:#3498db;margin-bottom:5px">🧠 <span id="thinking-player">東家</span> 思考中...</div>
<div id="ai-text">遊戲即將開始...</div>
</div>
<div class="overlay action-bar">
<button class="btn" onclick="skipAction()">過</button>
<button class="btn" onclick="ponAction()">碰</button>
<button class="btn" onclick="kongAction()">槓</button>
<button class="btn primary" onclick="winAction()">食糊!!</button>
</div>

<script>
console.log('Starting Mahjong Arena...');

var TILE_W = 0.28, TILE_H = 0.08, TILE_D = 0.4;


// Use local tile images
var tileImageUrls = {
  '1M': 'tiles/Man1.png',
  '2M': 'tiles/Man2.png',
  '3M': 'tiles/Man3.png',
  '4M': 'tiles/Man4.png',
  '5M': 'tiles/Man5.png',
  '6M': 'tiles/Man6.png',
  '7M': 'tiles/Man7.png',
  '8M': 'tiles/Man8.png',
  '9M': 'tiles/Man9.png',
  '1D': 'tiles/Pin1.png',
  '2D': 'tiles/Pin2.png',
  '3D': 'tiles/Pin3.png',
  '4D': 'tiles/Pin4.png',
  '5D': 'tiles/Pin5.png',
  '6D': 'tiles/Pin6.png',
  '7D': 'tiles/Pin7.png',
  '8D': 'tiles/Pin8.png',
  '9D': 'tiles/Pin9.png',
  '1S': 'tiles/Sou1.png',
  '2S': 'tiles/Sou2.png',
  '3S': 'tiles/Sou3.png',
  '4S': 'tiles/Sou4.png',
  '5S': 'tiles/Sou5.png',
  '6S': 'tiles/Sou6.png',
  '7S': 'tiles/Sou7.png',
  '8S': 'tiles/Sou8.png',
  '9S': 'tiles/Sou9.png',
  'E': 'tiles/Ton.png',
  'S_h': 'tiles/Nan.png',
  'W': 'tiles/Ton.png',
  'N': 'tiles/Pei.png',
  'R': 'tiles/Chun.png',
  'G': 'tiles/Hatsu.png',
  'B': 'tiles/Haku.png',
};

// Tile loader
var tileTextures = {};
// Load tiles in background (optional)
function loadTiles() {
  console.log('Loading tiles in background...');
  var loaded = 0;
  for (var label in tileImageUrls) {
    (function(l) {
      var img = new Image();
      img.onload = function() {
        var cvs = document.createElement('canvas');
        cvs.width = img.width; cvs.height = img.height;
        cvs.getContext('2d').drawImage(img,0,0);
        var tex = new THREE.CanvasTexture(cvs);
        tex.magFilter = THREE.NearestFilter;
        tileTextures[l] = tex;
        loaded++;
        if(loaded === Object.keys(tileImageUrls).length) console.log('All tiles loaded!');
      };
      img.onerror = function(){ loaded++; };
      img.src = tileImageUrls[l];
    })(label);
  }
}


function initGame() {
  var suits = ['M', 'D', 'S'];
  var honors = ['E', 'S_h', 'W', 'N', 'R', 'G', 'B'];
  var flowers = ['F1','F2','F3','F4','F5','F6','F7','F8'];
  var tiles = [];
  for(var s of suits) for(var n=1; n<=9; n++) for(var i=0; i<4; i++) tiles.push(n + s);
  for(var h of honors) for(var i=0; i<4; i++) tiles.push(h);
  for(var f of flowers) tiles.push(f);
  for(var i=tiles.length-1; i>0; i--) { var j=Math.floor(Math.random()*(i+1)); var tmp=tiles[i]; tiles[i]=tiles[j]; tiles[j]=tmp; }
  gameState.wall = tiles;
  for(var p=0; p<4; p++) { gameState.players[p].hand = []; gameState.players[p].discards = []; for(var i=0; i<13; i++) gameState.players[p].hand.push(tiles.pop()); sortHand(gameState.players[p].hand); }
  document.getElementById('remain').textContent = tiles.length;
}

function createTable() {
  var geo = new THREE.CylinderGeometry(5, 5.2, 0.2, 64);
  var mat = new THREE.MeshStandardMaterial({color: 0x0a141e, roughness: 0.3, metalness: 0.4});
  var table = new THREE.Mesh(geo, mat);
  table.position.y = -0.11;
  scene.add(table);
}

function getHandPos(p, i) {
  var s = HAND_SPACING;
  if(p===0) return new THREE.Vector3((i-6)*s, TILE_H/2+0.005, 4.0);
  if(p===1) return new THREE.Vector3(4.3, TILE_H/2+0.005, (i-6)*s);
  if(p===2) return new THREE.Vector3((6-i)*s, TILE_H/2+0.005, -4.0);
  return new THREE.Vector3(-4.3, TILE_H/2+0.005, (6-i)*s);
}

// ============================================================
// UPDATED getDiscardPos - Better spacing and alignment
// ============================================================
function getDiscardPos(p, i) {
  var row = Math.floor(i / 6);
  var col = i % 6;
  var w = 0.35;
  var d = 0.5;
  
  // Each player has their own corner far from center
  if(p === 0) {
    // East (bottom) - close to camera, spread X
    return new THREE.Vector3(col * w - 0.875, 0.1, 1.2 + row * d);
  } else if(p === 1) {
    // South (right) - right side
    return new THREE.Vector3(1.2 + row * d, 0.1, col * w - 0.875);
  } else if(p === 2) {
    // West (top) - far from camera
    return new THREE.Vector3(-col * w + 0.875, 0.1, -1.2 - row * d);
  } else {
    // North (left) - left side
    return new THREE.Vector3(-1.2 - row * d, 0.1, -col * w + 0.875);
  }
}
function renderAll() {
  for(var p=0; p<4; p++) { tileMeshes.hand[p].forEach(function(m){scene.remove(m)}); tileMeshes.hand[p]=[]; }
  riverGroup.clear();
  for(var p=0; p<4; p++) { tileMeshes.discard[p]=[]; }
  
  for(var p=0; p<4; p++) {
    for(var i=0; i<gameState.players[p].hand.length; i++) {
      var tile = createTile(gameState.players[p].hand[i], p);
      tile.position.copy(getHandPos(p,i));
      scene.add(tile);
      tileMeshes.hand[p].push(tile);
    }
  }
  
  for(var p=0; p<4; p++) {
    for(var i=0; i<gameState.players[p].discards.length; i++) {
      var tile = createTile(gameState.players[p].discards[i], p);
      tile.position.copy(getDiscardPos(p, i));
      riverGroup.add(tile);
      tileMeshes.discard[p].push(tile);
    }
  }
}

function nextTurn() {
  if(isAnimating || gameState.wall.length===0) return;
  isAnimating=true;
  var p=gameState.currentTurn;
  updateCurrentPlayerUI(p);
  document.getElementById('ai-text').textContent=gameState.players[p].name+' 分析中...';
  setTimeout(function(){
    gameState.players[p].hand.push(gameState.wall.pop());
    sortHand(gameState.players[p].hand);
    document.getElementById('remain').textContent=gameState.wall.length;
    renderAll();
    setTimeout(function(){
      var di=Math.floor(Math.random()*gameState.players[p].hand.length);
      var dt=gameState.players[p].hand.splice(di,1)[0];
      gameState.players[p].discards.push(dt);
      animateDiscard(p,dt,gameState.players[p].discards.length-1);
      gameState.currentTurn=(gameState.currentTurn+1)%4;
      isAnimating=false;
    },500);
  },800);
}

function animateDiscard(p,tile,di){
  var tp=getHandPos(p,0), dp=getDiscardPos(p,di);
  var tm=createTile(tile,p);
  tm.position.copy(tp); scene.add(tm);
  var start=Date.now(), dur=500;
  function loop(){ var e=Date.now()-start, t=Math.min(e/dur,1), k=1-Math.pow(1-t,3); tm.position.lerpVectors(tp,dp,k); if(t<1)requestAnimationFrame(loop);else{scene.remove(tm);var ft=createTile(tile,p);ft.position.copy(dp);riverGroup.add(ft);tileMeshes.discard[p].push(ft);}}
  loop();
}

function updateCurrentPlayerUI(p){for(var i=0;i<4;i++)document.getElementById('player-'+i).classList.toggle('active',i===p);document.getElementById('thinking-player').textContent=['東','南','西','北'][p];}

function startAutoPlay(){if(autoPlayInterval)clearInterval(autoPlayInterval);autoPlayInterval=setInterval(function(){if(isAutoPlaying&&!isAnimating)nextTurn();},2500);}

function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
window.toggleAutoPlay=function(){isAutoPlaying=!isAutoPlaying;document.getElementById('autoplay-btn').textContent=isAutoPlaying?'暫停':'開始';};

init();
</script>
</body>
</html>
