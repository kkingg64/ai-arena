<!DOCTYPE html>
<html lang="zh-Hant">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>AI Mahjong Arena | MADHORSE Ltd.</title>
 <style>
 body { margin: 0; overflow: hidden; background: #050a0f; font-family: 'Segoe UI', sans-serif; }
 canvas { display: block; }

 /* UI Overlays */
 .overlay { position: absolute; pointer-events: none; width: 100%; color: white; }
 
 .top-bar { top: 0; height: 60px; background: rgba(10, 20, 30, 0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
 
 .action-bar { bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; pointer-events: auto; }
 .btn { padding: 10px 25px; background: #1a3a5c; border: 1px solid #3498db; color: #3498db; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
 .btn:hover { background: #3498db; color: white; box-shadow: 0 0 15px #3498db; }
 .btn.primary { background: #e74c3c; border-color: #ff7675; color: white; }

 .thought-stream { position: absolute; left: 20px; bottom: 120px; width: 320px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; font-size: 14px; line-height: 1.6; }
 .thought-stream .player-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
 .thought-stream .player-0 { background: #e74c3c; }
 .thought-stream .player-1 { background: #3498db; }
 .thought-stream .player-2 { background: #2ecc71; }
 .thought-stream .player-3 { background: #f39c12; }
 
 /* Player Labels */
 .player-label { position: absolute; color: white; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-size: 16px; }
 .player-label.top { top: 80px; left: 50%; transform: translateX(-50%); }
 .player-label.bottom { bottom: 200px; left: 50%; transform: translateX(-50%); }
 .player-label.left { left: 20px; top: 50%; transform: translateY(-50%); }
 .player-label.right { right: 20px; top: 50%; transform: translateY(-50%); }
 .player-label .ai-name { font-size: 12px; opacity: 0.8; }
 .player-label.active { color: #f1c40f; text-shadow: 0 0 10px #f1c40f; }
 
 #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a0f; display: flex; justify-content: center; align-items: center; z-index: 100; }
 </style>
</head>
<body>

 <div id="loading">載入 3D 競技場中...</div>

 <div class="overlay top-bar">
 <div>局數: <span id="round">1/8</span></div>
 <div>本場: <span id="pool">0</span></div>
 <div>剩餘牌: <span id="remain">70</span></div>
 <div>莊家: <strong style="color:#f1c40f" id="dealer">東</strong></div>
 <button class="btn" style="padding: 5px 10px" onclick="toggleAutoPlay()">⏯️ <span id="autoplay-btn">暫停</span></button>
 </div>

 <div class="player-label top" id="player-2">
 <div>西</div>
 <div class="ai-name" id="name-2">Claude</div>
 </div>
 <div class="player-label left" id="player-3">
 <div>南</div>
 <div class="ai-name" id="name-3">Gemini</div>
 </div>
 <div class="player-label right" id="player-1">
 <div>北</div>
 <div class="ai-name" id="name-1">Llama</div>
 </div>
 <div class="player-label bottom" id="player-0">
 <div>東</div>
 <div class="ai-name" id="name-0">GPT-4o (你)</div>
 </div>

 <div class="thought-stream">
 <div style="color: #3498db; margin-bottom: 5px;">🧠 <span id="thinking-player">東家</span> 思考中...</div>
 <div id="ai-text">遊戲即將開始，請稍候...</div>
 </div>

 <div class="overlay action-bar">
 <button class="btn" onclick="skipAction()">過</button>
 <button class="btn" onclick="ponAction()">碰</button>
 <button class="btn" onclick="kongAction()">槓</button>
 <button class="btn primary" onclick="winAction()">食糊!!</button>
 <button class="btn" style="color:#95a5a6; border-color:#7f8c8d" onclick="discardTile()">棄牌</button>
 </div>

 <script type="importmap">
 {
 "imports": {
 "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
 "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
 }
 }
 </script>

 <script type="module">
 import * as THREE from 'three';
 import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

 let scene, camera, renderer, controls;
 const TILE_WIDTH = 0.3, TILE_HEIGHT = 0.4, TILE_DEPTH = 0.2, GAP = 0.005;
 const DISCARD_GAP = 0.05;
 
 // 牌堆
 const TILES = [];
 const tileMeshes = { hand: [[],[],[],[]], discard: [[],[],[],[]], wall: [] };
 let isAnimating = false;
 let autoPlayInterval = null;
 let isAutoPlaying = true;

 // 遊戲狀態
 const gameState = {
 players: [
 { name: "GPT-4o", hand: [], discards: [], seat: 0 },
 { name: "Llama", hand: [], discards: [], seat: 1 },
 { name: "Claude", hand: [], discards: [], seat: 2 },
 { name: "Gemini", hand: [], discards: [], seat: 3 }
 ],
 currentTurn: 0,
 wall: [],
 dealer: 0,
 round: 1,
 pool: 0
 };

 // 生成牌面紋理
 function createTileTexture(label) {
 const canvas = document.createElement('canvas');
 canvas.width = 128;
 canvas.height = 170;
 const ctx = canvas.getContext('2d');
 
 ctx.fillStyle = '#f8f4eb';
 ctx.fillRect(0, 0, 128, 170);
 ctx.strokeStyle = '#c9b896';
 ctx.lineWidth = 4;
 ctx.strokeRect(2, 2, 124, 166);
 
 ctx.fillStyle = '#1a1a2e';
 ctx.font = 'bold 48px Arial';
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.fillText(label, 64, 85);
 
 ctx.font = 'bold 16px Arial';
 ctx.fillText(label, 16, 20);
 ctx.fillText(label, 112, 150);
 
 return new THREE.CanvasTexture(canvas);
 }

 function init() {
 scene = new THREE.Scene();
 scene.background = new THREE.Color(0x050a0f);

 camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
 camera.position.set(0, 8, 10);

 renderer = new THREE.WebGLRenderer({ antialias: true });
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.shadowMap.enabled = true;
 document.body.appendChild(renderer.domElement);

 controls = new OrbitControls(camera, renderer.domElement);
 controls.enableDamping = true;
 controls.maxPolarAngle = Math.PI / 2.1;
 controls.minDistance = 5;
 controls.maxDistance = 20;

 const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
 scene.add(ambientLight);
 const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
 directionalLight.position.set(5, 10, 5);
 directionalLight.castShadow = true;
 scene.add(directionalLight);

 createTable();
 initGame();
 createAllTiles();

 document.getElementById('loading').style.display = 'none';
 animate();
 
 // 開始自動對戰
 startAutoPlay();
 }

 function initGame() {
 // 初始化牌牆 (144張)
 const suits = ['S','D','W'];
 const honors = ['E','S','W','N','R','G','W'];
 const tiles = [];
 
 // 萬子索子筒子
 for(let s of suits) {
 for(let n=1; n<=9; n++) {
 for(let i=0; i<4; i++) tiles.push(n + s);
 }
 }
 // 字牌
 for(let h of honors) {
 for(let i=0; i<4; i++) tiles.push(h);
 }
 // 花牌
 for(let i=1; i<=8; i++) {
 tiles.push('F' + i);
 }
 
 // 洗牌
 for (let i = tiles.length - 1; i > 0; i--) {
 const j = Math.floor(Math.random() * (i + 1));
 [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
 }
 
 gameState.wall = tiles;
 
 // 發牌
 for(let p=0; p<4; p++) {
 gameState.players[p].hand = [];
 for(let i=0; i<13; i++) {
 gameState.players[p].hand.push(tiles.pop());
 }
 // 排序手牌
 gameState.players[p].hand.sort();
 }
 
 // 更新 UI
 document.getElementById('remain').textContent = tiles.length;
 }

 function createTable() {
 const geometry = new THREE.CylinderGeometry(5, 5.2, 0.2, 64);
 const material = new THREE.MeshStandardMaterial({ color: 0x0a141e, roughness: 0.2, metalness: 0.5 }); 
 const table = new THREE.Mesh(geometry, material);
 table.position.y = -0.11;
 table.receiveShadow = true;
 scene.add(table);
 }

 function createTileMesh(label, isFaceUp) {
 const group = new THREE.Group();
 
 let texture;
 if (isFaceUp && label) {
 texture = createTileTexture(label);
 } else {
 // 蓋牌 - 藍色背面
 const canvas = document.createElement('canvas');
 canvas.width = 128;
 canvas.height = 170;
 const ctx = canvas.getContext('2d');
 ctx.fillStyle = '#1a3a5c';
 ctx.fillRect(0, 0, 128, 170);
 ctx.strokeStyle = '#2a4a6c';
 ctx.lineWidth = 3;
 ctx.strokeRect(5, 5, 118, 160);
 texture = new THREE.CanvasTexture(canvas);
 }
 
 const faceMat = new THREE.MeshPhongMaterial({ map: texture });
 const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
 const backMat = new THREE.MeshPhongMaterial({ map: texture });
 
 const materials = [bodyMat, bodyMat, faceMat, bodyMat, bodyMat, backMat];
 const mesh = new THREE.Mesh(new THREE.BoxGeometry(TILE_WIDTH, TILE_HEIGHT, TILE_DEPTH), materials);
 mesh.castShadow = true;
 group.add(mesh);
 
 return group;
 }

 function getHandPosition(playerIndex, tileIndex) {
 const spacing = TILE_WIDTH + 0.008;
 const totalWidth = 13 * spacing;
 const startX = -totalWidth / 2 + spacing / 2;
 
 switch(playerIndex) {
 case 0: // 下方 (自己) - 朝向觀眾
 return new THREE.Vector3(startX + tileIndex * spacing, TILE_HEIGHT/2, 4);
 case 1: // 右邊
 return new THREE.Vector3(4.5, TILE_HEIGHT/2, startX + tileIndex * spacing);
 case 2: // 上方
 return new THREE.Vector3(-(startX + tileIndex * spacing), TILE_HEIGHT/2, -4.5);
 case 3: // 左邊
 return new THREE.Vector3(-4.5, TILE_HEIGHT/2, -(startX + tileIndex * spacing));
 }
 }

 function getHandRotation(playerIndex) {
 switch(playerIndex) {
 case 0: return new THREE.Euler(-0.2, 0, 0);
 case 1: return new THREE.Euler(0, 0, -0.2);
 case 2: return new THREE.Euler(0.2, Math.PI, 0);
 case 3: return new THREE.Euler(0, 0, 0.2);
 }
 }

 function getDiscardPosition(playerIndex, tileIndex) {
 const row = Math.floor(tileIndex / 6);
 const col = tileIndex % 6;
 const dist = 1.8; 
 const sx = TILE_WIDTH + DISCARD_GAP;
 const sz = TILE_HEIGHT + DISCARD_GAP;
 
 switch(playerIndex) {
 case 0: return new THREE.Vector3((col-2.5)*sx, 0.015, dist+row*sz);
 case 1: return new THREE.Vector3(-dist-row*sz, 0.015, (col-2.5)*sx);
 case 2: return new THREE.Vector3(-(col-2.5)*sx, 0.015, -dist-row*sz);
 case 3: return new THREE.Vector3(dist+row*sz, 0.015, -(col-2.5)*sx);
 }
 }

 function getDiscardRotation(playerIndex) {
 switch(playerIndex) {
 case 0: return new THREE.Euler(Math.PI/2, 0, 0);
 case 1: return new THREE.Euler(Math.PI/2, 0, Math.PI/2);
 case 2: return new THREE.Euler(Math.PI/2, 0, Math.PI);
 case 3: return new THREE.Euler(Math.PI/2, 0, -Math.PI/2);
 }
 }

 function createAllTiles() {
 // 清除舊牌
 for(let p=0; p<4; p++) {
 tileMeshes.hand[p].forEach(m => scene.remove(m));
 tileMeshes.discard[p].forEach(m => scene.remove(m));
 tileMeshes.hand[p] = [];
 tileMeshes.discard[p] = [];
 }
 
 // 創建手牌
 for(let p=0; p<4; p++) {
 for(let i=0; i<gameState.players[p].hand.length; i++) {
 const label = gameState.players[p].hand[i];
 // 只有玩家0可以看到自己的牌，其他人都是蓋牌
 const isFaceUp = (p === 0);
 const tile = createTileMesh(label, isFaceUp);
 tile.position.copy(getHandPosition(p, i));
 tile.rotation.copy(getHandRotation(p));
 tile.userData = { player: p, index: i, type: 'hand' };
 scene.add(tile);
 tileMeshes.hand[p].push(tile);
 }
 }
 }

 async function nextTurn() {
 if (isAnimating || gameState.wall.length === 0) return;
 
 isAnimating = true;
 const player = gameState.currentTurn;
 const playerName = gameState.players[player].name;
 
 // 更新 UI - 顯示當前玩家
 updateCurrentPlayerUI(player);
 
 // 思考中
 const thoughts = [
 `${playerName} 正在分析手牌局勢...`,
 `${playerName} 評估各張牌的價值...`,
 `${playerName} 考慮是否碰牌或槓牌...`,
 `${playerName} 計算胡牌機會...`,
 `${playerName} 觀察場上局勢...`
 ];
 document.getElementById('ai-text').textContent = thoughts[Math.floor(Math.random() * thoughts.length)];
 
 await sleep(800);
 
 // 摸牌
 const drawnTile = gameState.wall.pop();
 gameState.players[player].hand.push(drawnTile);
 gameState.players[player].hand.sort();
 
 // 更新 UI
 document.getElementById('remain').textContent = gameState.wall.length;
 
 // 重新渲染手牌
 createAllTiles();
 await sleep(500);
 
 // 打牌 (AI 隨機選擇)
 const discardIndex = Math.floor(Math.random() * gameState.players[player].hand.length);
 const discardedTile = gameState.players[player].hand.splice(discardIndex, 1)[0];
 gameState.players[player].discards.push(discardedTile);
 
 // 動畫：從手牌移到棄牌區
 await animateDiscard(player, discardedTile, gameState.players[player].discards.length - 1);
 
 // 重新渲染
 createAllTiles();
 
 // 輪到下一家
 gameState.currentTurn = (gameState.currentTurn + 1) % 4;
 isAnimating = false;
 }

 async function animateDiscard(player, tile, discardIndex) {
 const handPos = getHandPosition(player, 0); // 簡化：從手牌區域開始
 const discardPos = getDiscardPosition(player, discardIndex);
 const discardRot = getDiscardRotation(player);
 
 // 創建打出的牌 (翻轉顯示)
 const tileMesh = createTileMesh(tile, true);
 tileMesh.position.copy(handPos);
 tileMesh.rotation.copy(getHandRotation(player));
 scene.add(tileMesh);
 
 // 平滑動畫
 const duration = 600;
 const startTime = Date.now();
 const startPos = handPos.clone();
 const startRot = getHandRotation(player).clone();
 
 return new Promise(resolve => {
 function animate() {
 const elapsed = Date.now() - startTime;
 const t = Math.min(elapsed / duration, 1);
 const easeT = 1 - Math.pow(1 - t, 3); // ease-out
 
 tileMesh.position.lerpVectors(startPos, discardPos, easeT);
 tileMesh.rotation.x = startRot.x + (discardRot.x - startRot.x) * easeT;
 tileMesh.rotation.y = startRot.y + (discardRot.y - startRot.y) * easeT;
 tileMesh.rotation.z = startRot.z + (discardRot.z - startRot.z) * easeT;
 
 if (t < 1) {
 requestAnimationFrame(animate);
 } else {
 tileMeshes.discard[player].push(tileMesh);
 resolve();
 }
 }
 animate();
 });
 }

 function updateCurrentPlayerUI(player) {
 for(let i=0; i<4; i++) {
 const label = document.getElementById('player-' + i);
 if (i === player) {
 label.classList.add('active');
 } else {
 label.classList.remove('active');
 }
 }
 
 const directions = ['東', '北', '西', '南'];
 document.getElementById('thinking-player').textContent = directions[player];
 }

 function startAutoPlay() {
 if (autoPlayInterval) clearInterval(autoPlayInterval);
 autoPlayInterval = setInterval(() => {
 if (isAutoPlaying && !isAnimating) {
 nextTurn();
 }
 }, 2000);
 }

 function sleep(ms) {
 return new Promise(resolve => setTimeout(resolve, ms));
 }

 function animate() {
 requestAnimationFrame(animate);
 controls.update();
 renderer.render(scene, camera);
 }

 window.addEventListener('resize', () => {
 camera.aspect = window.innerWidth / window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
 });

 // 暴露全域函數
 window.toggleAutoPlay = function() {
 isAutoPlaying = !isAutoPlaying;
 document.getElementById('autoplay-btn').textContent = isAutoPlaying ? '暫停' : '開始';
 };
 window.skipAction = function() { console.log('Skip'); };
 window.ponAction = function() { console.log('Pon'); };
 window.kongAction = function() { console.log('Kong'); };
 window.winAction = function() { console.log('Win'); };
 window.discardTile = function() { 
 if (gameState.currentTurn === 0 && !isAnimating) {
 nextTurn();
 }
 };

 init();
 </script>
</body>
</html>
