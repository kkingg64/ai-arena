version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/aiarena}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-byte-key-here}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-fabio-minimax-key-2026}
      - MINIMAX_ENDPOINT=${MINIMAX_ENDPOINT:-http://76.13.215.13:8081/v1}
      - DEBUG=${DEBUG:-true}
    depends_on:
      - db
    volumes:
      - ./app:/app/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  db:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aiarena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
